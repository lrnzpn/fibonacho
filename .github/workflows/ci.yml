name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Run All Tests
    uses: ./.github/workflows/test.yml
    with:
      node-version: '20'
    secrets: inherit

  build:
    name: Build Application
    needs: test
    uses: ./.github/workflows/build.yml
    with:
      node-version: '20'
    secrets: inherit
