name: Production Quality Gates

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run Tests Before Deploy
    uses: ./.github/workflows/test.yml
    with:
      node-version: '20'
    secrets: inherit

  build:
    name: Build Before Deploy
    needs: test
    uses: ./.github/workflows/build.yml
    with:
      node-version: '20'
    secrets: inherit
