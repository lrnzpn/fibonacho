name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run Tests Before Deploy
    uses: ./.github/workflows/test.yml
    with:
      node-version: '20'
    secrets: inherit

  build:
    name: Build Before Deploy
    needs: test
    uses: ./.github/workflows/build.yml
    with:
      node-version: '20'
    secrets: inherit

  deploy-production:
    name: Deploy to Vercel Production
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v4
        env:
          cache-name: cache-node-modules
        with:
          path: ~/.npm
          key: ${{ runner.os }}-deploy-prod-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-deploy-prod-${{ env.cache-name }}-
            ${{ runner.os }}-deploy-prod-
            ${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Create deployment notification
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              target_url: 'https://fibonacho.vercel.app',
              description: 'Deployed to production',
              context: 'vercel/production'
            })
